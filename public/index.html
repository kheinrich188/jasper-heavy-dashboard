<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jasper Heavy Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3"></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>Jasper Heavy</h1>
          <p>Dashboard</p>
        </div>
        <button id="refreshBtn">Aktualisieren</button>
      </header>

      <section class="cards" id="cards"></section>

      <section class="charts">
        <article class="panel">
          <h2>Tempo-Spitzen der letzten 24h (km/h)</h2>
          <div class="chart-wrap">
            <canvas id="speedChart"></canvas>
          </div>
        </article>
        <article class="panel">
          <h2>Tagesdistanz (letzte 30 Tage)</h2>
          <div class="chart-wrap">
            <canvas id="distanceChart"></canvas>
          </div>
        </article>
        <article class="panel">
          <h2>Zoomies pro Tag</h2>
          <div class="chart-wrap">
            <canvas id="zoomiesChart"></canvas>
          </div>
        </article>
        <article class="panel">
          <h2>Aktivste Stunden</h2>
          <div class="chart-wrap">
            <canvas id="hourChart"></canvas>
          </div>
        </article>
      </section>

      <section class="panel sessions">
        <h2>Letzte Sessions</h2>
        <div id="sessions"></div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
