<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jasper Heavy Dashboard</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3"></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>Jasper</h1>
          <p class="headline-sub">Aktivitätsübersicht</p>
          <p class="subtitle">
            Alle Laufdaten auf einen Blick für das
            <a href="https://www.elmato.de" target="_blank" rel="noopener noreferrer">Elmato Katzenlaufrad</a>
          </p>
        </div>
        <button id="refreshBtn" aria-label="Daten aktualisieren" title="Daten aktualisieren">
          <i class="fa-solid fa-rotate-right" aria-hidden="true"></i>
        </button>
      </header>

      <section class="hero panel" id="heroSection">
        <div id="hero"></div>
      </section>

      <section class="period-strip">
        <div id="periodSelector" class="period-selector"></div>
      </section>

      <section class="cards" id="cards"></section>

      <section class="charts">
        <article class="panel chart-panel chart-main">
          <h2>Tempo-Spitzen der letzten 24h (km/h)</h2>
          <div class="chart-wrap chart-wrap-main">
            <canvas id="speedChart"></canvas>
          </div>
        </article>
        <article class="panel chart-panel chart-hours">
          <h2>Aktivste Stunden</h2>
          <div class="chart-wrap chart-wrap-small">
            <canvas id="hourChart"></canvas>
          </div>
        </article>
        <article class="panel chart-panel">
          <h2>Tagesdistanz (letzte 30 Tage)</h2>
          <div class="chart-wrap chart-wrap-small">
            <canvas id="distanceChart"></canvas>
          </div>
        </article>
        <article class="panel chart-panel">
          <h2>Zoomies pro Tag</h2>
          <div class="chart-wrap chart-wrap-small">
            <canvas id="zoomiesChart"></canvas>
          </div>
        </article>
      </section>

      <section class="panel sessions" id="sessionsSection">
        <h2>Letzte Sessions</h2>
        <div id="sessions"></div>
      </section>

      <section class="panel" id="periodSummarySection">
        <h2>Zeitraumvergleich</h2>
        <div id="periodSummary"></div>
      </section>

      <section class="panel report" id="monthlyReportSection">
        <h2>Highlights (letzter Monat)</h2>
        <div id="monthlyReport"></div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
