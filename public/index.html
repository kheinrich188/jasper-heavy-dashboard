<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jasper Heavy Dashboard</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3"></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>Jaspers Wheel Analytics</h1>
          <p class="subtitle">
            Das Performance-Dashboard für das
            <a href="https://www.elmato.de" target="_blank" rel="noopener noreferrer">Elmato Katzenlaufrad</a>
          </p>
        </div>
        <button id="refreshBtn">Aktualisieren</button>
      </header>

      <section class="panel period-panel">
        <h2>Zeitraum</h2>
        <div id="periodSelector" class="period-selector"></div>
      </section>

      <section class="cards" id="cards"></section>

      <section class="charts">
        <article class="panel">
          <h2>Tempo-Spitzen der letzten 24h (km/h)</h2>
          <div class="chart-wrap">
            <canvas id="speedChart"></canvas>
          </div>
        </article>
        <article class="panel">
          <h2>Tagesdistanz (letzte 30 Tage)</h2>
          <div class="chart-wrap">
            <canvas id="distanceChart"></canvas>
          </div>
        </article>
        <article class="panel">
          <h2>Zoomies pro Tag</h2>
          <div class="chart-wrap">
            <canvas id="zoomiesChart"></canvas>
          </div>
        </article>
        <article class="panel">
          <h2>Aktivste Stunden</h2>
          <div class="chart-wrap">
            <canvas id="hourChart"></canvas>
          </div>
        </article>
      </section>

      <section class="panel sessions">
        <h2>Letzte Sessions</h2>
        <div id="sessions"></div>
      </section>

      <section class="panel">
        <h2>Zeitraum-Überblick</h2>
        <div id="periodSummary"></div>
      </section>

      <section class="panel report">
        <h2>Highlight-Report (letzter Monat)</h2>
        <div id="monthlyReport"></div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
